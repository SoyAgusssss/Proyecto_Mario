<div class="container my-4">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Mario Dex</h1>

    <button
      class="btn btn-primary"
      (click)="openModal()">
      Añadir Personaje
    </button>
  </div>

  <div class="row g-4">
    <div class="col-12 col-sm-6 col-md-4 col-lg-3"
         *ngFor="let personaje of personajes">
      <app-personaje-item [personaje]="personaje"></app-personaje-item>
    </div>
  </div>
</div>

<!-- MODAL -->
<div
  class="modal fade show d-block"
  tabindex="-1"
  *ngIf="showModal"
  style="background: rgba(0,0,0,.5);">

  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nuevo Personaje</h5>
        <button type="button" class="btn-close" (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <app-nuevo-personaje (close)="closeModal()"></app-nuevo-personaje>
      </div>

    </div>
  </div>
</div>
