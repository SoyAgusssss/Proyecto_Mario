<form (ngSubmit)="submit()">

  <div class="mb-3">
    <label class="form-label">Nombre</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="nombre"
      name="nombre"
      required>
  </div>

  <div class="mb-3">
    <label class="form-label">Tipo</label>
    <input
      type="text"
      class="form-control"
      [(ngModel)]="tipo"
      name="tipo"
      required>
  </div>

  <div class="mb-3">
    <label class="form-label">Poder</label>
    <input
      type="number"
      class="form-control"
      [(ngModel)]="poder"
      name="poder"
      required>
  </div>

  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-secondary" (click)="cancel()">
      Cancelar
    </button>

    <button type="submit" class="btn btn-success">
      Crear
    </button>
  </div>

</form>
